<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cognito - Take Attendance</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/styles/assets/bootstrap/css/bootstrap.min.css">
  <link href="{{ url_for('static', filename='styles/fras-theme.css') }}" rel="stylesheet" type="text/css" />

  <style>
    .video-container {
      position: relative;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      border: 2px solid var(--accent-green);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
      background: #000;
    }

    .video-container::before {
      content: "LIVE FEED";
      position: absolute;
      top: 20px;
      left: 20px;
      color: var(--accent-green);
      font-weight: bold;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 5px;
      z-index: 10;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }

      100% {
        opacity: 1;
      }
    }

    .video-container img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="/admin">
        <h3 style="color: var(--accent-green); margin: 0; font-weight: 700; letter-spacing: 2px;">Cognito</h3>
      </a>
      <div style="color: grey;">
        <a href="/admin" style="color: var(--text-primary); text-decoration: none;">Dashboard</a>
      </div>
      <div style="display: flex; align-items: center; gap: 10px;">
        <a href="/" class="btn btn-sm btn-outline-danger" style="border-color: #ff4444; color: #ff4444;">Log Out</a>
      </div>
    </div>
  </nav>

  <div class="container mt-5 text-center">
    <h2 class="mb-4">Real-Time Recognition</h2>

    <div class="video-container">
      <img id="processed-feed" src="{{ url_for('static', filename='Files/Resources/background.png') }}"
        alt="Video Feed" />
      <video id="webcam" autoplay playsinline style="display: none;"></video>
      <canvas id="canvas" style="display: none;"></canvas>
    </div>

    <div class="mt-4">
      <p style="color: #666;">System is active and logging attendance automatically.</p>
      <a href="/admin" class="btn btn-primary" style="width: auto; display: inline-block;">Return to Dashboard</a>
    </div>
  </div>

  <script src="/static/styles/assets/bootstrap/js/bootstrap.bundle.min.js"></script>

  <script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const processedFeed = document.getElementById('processed-feed');
    const ctx = canvas.getContext('2d');

    // Request camera access
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
        video.play();
        video.onloadedmetadata = () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          sendFrame();
        };
      })
      .catch(err => {
        console.error("Error accessing webcam:", err);
        alert("Could not access webcam. Please ensure permissions are granted.");
      });

    function sendFrame() {
      // Draw video frame to canvas
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      // Convert to base64
      const dataURL = canvas.toDataURL('image/jpeg', 0.8);

      fetch('/process_frame', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ image: dataURL })
      })
        .then(response => response.json())
        .then(data => {
          if (data.image) {
            processedFeed.src = data.image;
          }
          // Throttle slightly to prevent flooding backend (150ms ~= 6-7 fps)
          setTimeout(sendFrame, 150);
        })
        .catch(err => {
          console.error("Error processing frame:", err);
          // On error, wait longer before retrying
          setTimeout(sendFrame, 1000);
        });
    }
  </script>
</body>

</html>
